name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Reusable-workflow entry. Lets release.yml (and future
  # downstream callers) use this whole pipeline as a gate via
  # `uses: ./.github/workflows/ci.yml`. Without this trigger the
  # `uses:` from release.yml fails at workflow-resolution time.
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep 'cyrius *= *"' cyrius.cyml 2>/dev/null | head -1 | sed 's/.*"\(.*\)"/\1/')}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Resolve dependencies
        run: cyrius deps

      - name: Lint
        # cyrius lint is file-at-a-time — loop over every src/*.cyr.
        # Catches trailing whitespace, tabs, long lines, global-init
        # forward refs, and CLAUDE.md-mandated style hits before
        # they reach review.
        run: |
          set -e
          for f in src/*.cyr; do cyrius lint "$f"; done

      - name: Vet includes
        # Audits the include graph from the entry point. Fails on
        # untrusted or missing deps. Cheap, catches typos in
        # `include "src/foo.cyr"` paths.
        run: cyrius vet src/main.cyr

      - name: Build
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/${{ github.event.repository.name }}

      - name: Test
        # v5.6.28: bare `cyrius test` picks up the [build].test entry
        # AND auto-discovers tests/*.tcyr — avoids the previous
        # `cyrius test src/test.cyr` form that hard-failed when the
        # stub didn't exist (Issue 1) and also wouldn't ever exercise
        # tests/${proj}.tcyr.
        run: cyrius test

      - name: Smoke — listing of the checkout
        # M1 acceptance check: built binary actually lists the
        # working tree and surfaces the expected scaffold files in
        # alphabetical (case-insensitive) order. Catches the class
        # of regressions where build + test pass but the binary
        # segfaults, emits garbage (e.g. the 0xed bug from M1's
        # var-buf-sizing gotcha), or skips entries.
        run: |
          set -e
          ./build/${{ github.event.repository.name }} > /tmp/listing
          for expected in cyrius.cyml VERSION README.md CHANGELOG.md src tests; do
            if ! grep -qx "$expected" /tmp/listing; then
              echo "missing '$expected' in listing:"
              cat /tmp/listing
              exit 1
            fi
          done

      - name: Smoke — error paths
        # Nonexistent path → exit 1 with stderr message. Locks in
        # the M1 contract that error paths surface non-zero exit so
        # shell pipelines using darshini don't silently swallow
        # missing-path bugs.
        run: |
          set +e
          out=$(./build/${{ github.event.repository.name }} /this/path/does/not/exist 2>&1)
          rc=$?
          set -e
          test "$rc" -eq 1 || { echo "expected exit 1 on missing path, got $rc"; echo "stderr: $out"; exit 1; }
          echo "$out" | grep -q "no such file or directory" || { echo "missing-path message not surfaced; got: $out"; exit 1; }

      - name: "Smoke — multi-path: dirs get headers + blanks between"
        # v1.1.1 contract. Two-dir invocation produces a
        # `src:` header, blank line, then `tests:` header.
        # Single-path invocation MUST NOT emit any header
        # (byte-identical to v1.1.0 for back-compat).
        run: |
          set -e
          ./build/${{ github.event.repository.name }} src tests > /tmp/multi
          grep -q "^src:$" /tmp/multi \
            || { echo "no 'src:' header in multi-path output:"; cat /tmp/multi; exit 1; }
          grep -q "^tests:$" /tmp/multi \
            || { echo "no 'tests:' header in multi-path output:"; cat /tmp/multi; exit 1; }
          ./build/${{ github.event.repository.name }} src > /tmp/single
          if grep -q "^src:$" /tmp/single; then
            echo "single-path leaked a header (regression vs v1.1.0):"
            cat /tmp/single
            exit 1
          fi
          # `-d` multi-path: no headers, one line per path.
          out=$(./build/${{ github.event.repository.name }} -d src tests | tr '\n' ' ')
          test "$out" = "src tests " \
            || { echo "-d multi-path mismatch: '$out'"; exit 1; }

      - name: Smoke — --help / --version exit 0 with expected output
        # v1.1 contract: both meta flags exit 0 + print to stdout.
        # --version output is exactly "darshini X.Y.Z\n".
        run: |
          set -e
          out=$(./build/${{ github.event.repository.name }} --version)
          test "$out" = "darshini 1.1.1" || { echo "--version mismatch: $out"; exit 1; }
          ./build/${{ github.event.repository.name }} --help > /tmp/help
          grep -q "^usage: darshini" /tmp/help \
            || { echo "--help missing usage line:"; cat /tmp/help; exit 1; }
          grep -q "^  -F " /tmp/help \
            || { echo "--help missing -F flag doc:"; cat /tmp/help; exit 1; }

      - name: Smoke — -F appends classify indicators
        # v1.1 contract: dirs get `/`, regular files no indicator,
        # the column reserves a cell either way for alignment.
        run: |
          set -e
          ./build/${{ github.event.repository.name }} -F > /tmp/classify
          grep -q '^src/$' /tmp/classify \
            || { echo "no 'src/' classify in -F output:"; cat /tmp/classify; exit 1; }
          grep -q '^CHANGELOG\.md $' /tmp/classify \
            || { echo "regular file should have trailing space (no indicator):"; cat /tmp/classify; exit 1; }

      - name: Smoke — -d renders single entry for dir
        # v1.1 contract: -d echoes path verbatim, -dF appends /,
        # -ld renders one long-format row.
        run: |
          set -e
          out=$(./build/${{ github.event.repository.name }} -d src)
          test "$out" = "src" || { echo "-d src mismatch: $out"; exit 1; }
          out=$(./build/${{ github.event.repository.name }} -dF src)
          test "$out" = "src/" || { echo "-dF src mismatch: $out"; exit 1; }

      - name: Smoke — --mime column under -l surfaces expected types
        # M8 contract: `darshini -l --mime` shows mime types
        # for the listing — text/markdown for .md, application/x-cyml
        # for .cyml, inode/directory for dirs. Acceptance per
        # roadmap M8: text/markdown + application/x-cyrius +
        # application/x-executable visible.
        # `--mime` without -l is parsed but renders no column.
        run: |
          set -e
          ./build/${{ github.event.repository.name }} -l --mime > /tmp/mime_long
          grep -qE 'text/markdown +CLAUDE\.md$' /tmp/mime_long \
            || { echo "no text/markdown for CLAUDE.md:"; cat /tmp/mime_long; exit 1; }
          grep -qE 'application/x-cyml +cyrius\.cyml$' /tmp/mime_long \
            || { echo "no application/x-cyml for cyrius.cyml:"; cat /tmp/mime_long; exit 1; }
          grep -qE 'inode/directory +docs$' /tmp/mime_long \
            || { echo "no inode/directory for docs/:"; cat /tmp/mime_long; exit 1; }
          # --mime without -l: column suppressed; verify no mime
          # token leaked into the short-format listing.
          ./build/${{ github.event.repository.name }} --mime > /tmp/mime_short
          if grep -qE '(text|application|image|inode)/' /tmp/mime_short; then
            echo "--mime without -l leaked mime tokens:"
            cat /tmp/mime_short
            exit 1
          fi

      - name: Smoke — --git column in repo + silent outside
        # M7 contract: `darshini --git` in the project root
        # surfaces status chars — at least one tracked `.` and
        # at least one ignored `!`. We don't pin specific
        # filenames as "clean" because CHANGELOG.md / state.md
        # etc. may have been touched in the same checkout.
        # Outside a git repo (e.g. /tmp) the column silently
        # doesn't appear — listing matches a no-flag invocation.
        run: |
          set -e
          ./build/${{ github.event.repository.name }} --git > /tmp/git_in_repo
          grep -qE '^\. ' /tmp/git_in_repo \
            || { echo "no tracked '. ...' lines in --git output:"; cat /tmp/git_in_repo; exit 1; }
          grep -q '^! build$' /tmp/git_in_repo \
            || { echo "no '! build' (ignored) in --git output:"; cat /tmp/git_in_repo; exit 1; }
          # Outside a repo — no column. /tmp may have varying
          # contents on CI runners; just assert no line starts
          # with a status-char + space pattern.
          ./build/${{ github.event.repository.name }} --git /tmp > /tmp/git_outside
          if grep -qE '^[.M?!] ' /tmp/git_outside; then
            echo "outside-repo --git leaked status chars:"
            cat /tmp/git_outside
            exit 1
          fi

      - name: Smoke — tree mode produces box-drawn output
        # M6 contract: `-T` recurses with box-drawing connectors.
        # Greps for the actual connector bytes (├ = e2 94 9c,
        # └ = e2 94 94) in the output, then verifies that
        # --level 1 limits depth (a single level should NOT
        # contain ANY connectors from a deeper-than-1 path —
        # we test by listing `docs` at --level 1 and checking
        # that no grandchildren appear in the output).
        run: |
          set -e
          ./build/${{ github.event.repository.name }} -T docs > /tmp/tree
          od -An -tx1 /tmp/tree | grep -q -E ' e2 94 9c ' \
            || { echo "tree output missing ├ connector:"; cat /tmp/tree; exit 1; }
          od -An -tx1 /tmp/tree | grep -q -E ' e2 94 94 ' \
            || { echo "tree output missing └ connector:"; cat /tmp/tree; exit 1; }
          # --level 1 on docs: shows docs + its direct children
          # (adr / architecture / development / examples / guides)
          # but NOT their contents (no roadmap.md, no
          # 0001-color-scheme.md, etc.). Negative grep.
          ./build/${{ github.event.repository.name }} -T --level 1 docs > /tmp/tree1
          grep -q "adr" /tmp/tree1 || { echo "--level 1 dropped adr/:"; cat /tmp/tree1; exit 1; }
          if grep -q "roadmap.md" /tmp/tree1; then
            echo "--level 1 leaked grandchildren:"
            cat /tmp/tree1
            exit 1
          fi

      - name: Smoke — pipe emits no icon glyphs
        # M5 contract: pipe → no Nerd Font PUA bytes. Same
        # principle as the color escape suppression — script
        # consumers see plain bytes only. Nerd Font glyphs are
        # in the U+E000–U+F8FF Private Use Area; their UTF-8
        # encodings start with `\xee` or `\xef` so an `od`
        # byte-scan catches a leak (PCRE in text mode misreads
        # the multi-byte sequence as a single char).
        run: |
          set -e
          ./build/${{ github.event.repository.name }} > /tmp/no_icons
          if od -An -tx1 /tmp/no_icons | grep -q -E ' (ee|ef) '; then
            echo "pipe output contained Nerd Font PUA bytes:"
            cat -v /tmp/no_icons
            exit 1
          fi

      - name: Smoke — TTY emits icons, --no-icons suppresses
        # M5 contract: TTY default shows icons; `--no-icons`
        # suppresses them under TTY. Tests both directions.
        run: |
          set -e
          script -qec "./build/${{ github.event.repository.name }}" /dev/null > /tmp/tty_icons
          od -An -tx1 /tmp/tty_icons | grep -q -E ' (ee|ef) ' || {
            echo "TTY-attached output had no Nerd Font PUA bytes (icons not firing):"
            cat -v /tmp/tty_icons
            exit 1
          }
          script -qec "./build/${{ github.event.repository.name }} --no-icons" /dev/null > /tmp/tty_no_icons
          if od -An -tx1 /tmp/tty_no_icons | grep -q -E ' (ee|ef) '; then
            echo "--no-icons failed to suppress Nerd Font PUA bytes:"
            cat -v /tmp/tty_no_icons
            exit 1
          fi

      - name: Smoke — pipe emits no color escapes
        # M4 contract: pipe → no SGR escapes (not just no column
        # layout, no color either). A regression that leaks `\x1b[`
        # into pipe output would be a CLAUDE.md hard-rule violation
        # (color must never reach a script consumer).
        run: |
          set -e
          ./build/${{ github.event.repository.name }} > /tmp/plain
          if grep -qP '\x1b\[' /tmp/plain; then
            echo "pipe output contained ANSI escapes:"
            cat -v /tmp/plain
            exit 1
          fi

      - name: Smoke — TTY emits color, --no-color suppresses
        # M4 contract: TTY-attached stdout shows escapes;
        # `--no-color` suppresses them even under TTY. Uses
        # `script -qec` to allocate a pty for the child.
        run: |
          set -e
          script -qec "./build/${{ github.event.repository.name }}" /dev/null > /tmp/tty_colored
          grep -qP '\x1b\[' /tmp/tty_colored || {
            echo "TTY-attached output had no ANSI escapes (color not firing):"
            cat -v /tmp/tty_colored
            exit 1
          }
          script -qec "./build/${{ github.event.repository.name }} --no-color" /dev/null > /tmp/tty_plain
          if grep -qP '\x1b\[' /tmp/tty_plain; then
            echo "--no-color failed to suppress ANSI escapes:"
            cat -v /tmp/tty_plain
            exit 1
          fi

      - name: Smoke — pipe is single column
        # M3 contract: stdout-not-a-TTY → one entry per line.
        # `wc -l` on the listing should equal the entry count;
        # `awk '{print NF}'` on each line should be 1 (one field).
        # Catches regressions that would emit columns into a
        # pipe (a CLAUDE.md hard rule violation).
        run: |
          set -e
          ./build/${{ github.event.repository.name }} > /tmp/pipe
          lines=$(wc -l < /tmp/pipe)
          test "$lines" -gt 5 || { echo "expected >5 entries in checkout listing, got $lines"; exit 1; }
          awk 'NF != 1 { print "multi-field line:", $0; bad=1 } END { exit bad+0 }' /tmp/pipe \
            || { echo "pipe output had multi-field lines"; cat /tmp/pipe; exit 1; }

      - name: Smoke — -1 forces single column under TTY
        # `script -qec CMD /dev/null` allocates a pty so the child
        # sees a TTY on stdout. Without -1, the column layout would
        # kick in; with -1, single column wins. Locks in the
        # `-1` override semantics.
        #
        # `--no-color --no-icons` strips the M4/M5 decoration that
        # would otherwise turn each line into a multi-field
        # `<ESC>[34m<icon-bytes> name<ESC>[0m` shape (awk's
        # default FS splits on whitespace and sees the inner
        # space as a field boundary). The structural check here
        # is "one entry per line"; decoration smokes test the
        # decoration paths separately.
        run: |
          set -e
          script -qec "./build/${{ github.event.repository.name }} -1 --no-color --no-icons" /dev/null > /tmp/single
          tr -d '\r' < /tmp/single > /tmp/single.clean
          awk 'NF != 1 { bad=1 } END { exit bad+0 }' /tmp/single.clean \
            || { echo "-1 produced multi-field lines under TTY (decoration stripped):"; cat /tmp/single.clean; exit 1; }
          lines=$(wc -l < /tmp/single.clean)
          test "$lines" -gt 5 || { echo "expected >5 entries under -1, got $lines"; exit 1; }

      - name: Smoke — long format -lh shape
        # M2 acceptance: `darshini -lh` produces aligned 4-column
        # rows (perms / size / mtime / name). Greps for a row
        # matching the exact column structure on a known file
        # (CHANGELOG.md) to lock in the perm-string, the human-
        # size suffix, and the UTC mtime YYYY-MM-DD HH:MM shape.
        run: |
          set -e
          ./build/${{ github.event.repository.name }} -lh > /tmp/long
          # Header row sanity: perms are 10 chars starting with -
          # or d/l/p/s/b/c; size has a digit; mtime matches the
          # YYYY-MM-DD HH:MM pattern; then a filename.
          grep -E '^[-dlpsbc][rwxstST-]{9} +[0-9]+(\.[0-9][KMGT])? [0-9]{4}-[0-9]{2}-[0-9]{2} [0-9]{2}:[0-9]{2} CHANGELOG\.md$' /tmp/long || {
            echo "no aligned CHANGELOG.md row matched in -lh output:"
            cat /tmp/long
            exit 1
          }
          # Unknown-flag rejection
          set +e
          out=$(./build/${{ github.event.repository.name }} -X 2>&1)
          rc=$?
          set -e
          test "$rc" -eq 1 || { echo "expected exit 1 on unknown flag, got $rc"; exit 1; }
          echo "$out" | grep -q "unknown flag" || { echo "unknown-flag message not surfaced; got: $out"; exit 1; }
